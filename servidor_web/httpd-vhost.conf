# Configuracion del sitio web de LogiTrans
# Apache sirve los ficheros estaticos directamente
# Las peticiones PHP las reenvía al contenedor logitrans-php

<VirtualHost *:80>
    DocumentRoot "/usr/local/apache2/htdocs"

    # Todo fichero con extension .php se envia al servidor PHP
    # logitrans-php es el nombre del contenedor, Docker lo resuelve automaticamente
    # 9000 es el puerto donde escucha PHP-FPM
    <FilesMatch "\.php$">
        SetHandler "proxy:fcgi://logitrans-php:9000"
    </FilesMatch>

    # Permisos del directorio raiz
    <Directory "/usr/local/apache2/htdocs">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
